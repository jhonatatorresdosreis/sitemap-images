name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp sitemap-imagem.xml _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <title>Sitemap</title>
          </head>
          <body>
            <p>Sitemap publicado.</p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
